version: '3.8'

services:
  app:
    build: .
    container_name: scooter-app
    ports:
      - "8080:8080"
    environment:
      - SPRING_DATASOURCE_URL=jdbc:postgresql://db:5432/scooter_rental
      - SPRING_DATASOURCE_USERNAME=scooter_user
      - SPRING_DATASOURCE_PASSWORD=scooter_password
      - SPRING_DATA_REDIS_HOST=redis
      - SPRING_DATA_REDIS_PORT=6379
    depends_on:
      - db
      - redis
    restart: always

  db:
    image: postgres:15-alpine
    container_name: scooter-db
    environment:
      POSTGRES_USER: scooter_user
      POSTGRES_PASSWORD: scooter_password
      POSTGRES_DB: scooter_rental
    ports:
      - "5434:5432"
    restart: unless-stopped

  redis:
    image: redis:7.2-alpine
    container_name: scooter-redis
    ports:
      - "6379:6379"
    restart: unless-stopped
